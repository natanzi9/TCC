<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADICIONAR ITENS</title>
    <link rel="shortcut icon" type="image/png" href="static/fiep.jpg">
    <link rel="stylesheet" href="{{ url_for('static', filename='style+itens.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="{{ url_for('static', filename='main.js') }}" defer></script>
</head>

<body onload="coloriraditens()">

    <div class="container">
        <img src="static/images.png">
        <div class="navbar">

            <a href="/home" id="home">
                <button> HOME </button>
            </a>
            <button id="itens"> ADICIONAR ITENS</button>

            <a href="/estoque">
                <button> ESTOQUE </button>
            </a>

            <a href="/saidas">
                <button> REGISTRAR SAÍDAS </button>
            </a>
            <a href="/">
                <button> FECHAR </button>
            </a>
        </div>
    </div>


    <div class="quadrado">

    <h1>ADICIONAR ITENS</h1>

    <form method="POST" action="/api/adicionaritem">

        <div>
            <label><strong>NOME</strong></label>
            <input class="input1" type="text" name="nome" required>
        </div>

        <div>
            <label><strong>CATEGORIA</strong></label>
            <input class="input5" type="text" name="categoria" required>
        </div>

        <div>
            <label><strong>DESCRIÇÃO</strong></label>
            <input class="input2" type="text" name="descricao" required>
        </div>

        <div>
            <label><strong>PREÇO</strong></label>
            <input class="input6" type="number" step="0.01" name="preco" required>
        </div>

        <div>
            <label><strong>QUANTIDADE</strong></label>
            <input class="input3" type="number" name="quantidade" required>
        </div>

        <div>
            <label><strong>ESTOQUE MÍNIMO</strong></label>
            <input class="input7" type="number" name="estoqueminimo" required>
        </div>

        <div class="botoes">
            <button type="submit">
                <strong>ADICIONAR</strong>
            </button>
        </div>

    </form>

</div>

</body>

</html>
